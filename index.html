const fmtDate=(d)=>{
  const date=new Date(d),now=Date.now(),diff=now-date;
  if(diff<60000)return"just now";
  if(diff<3600000)return Math.floor(diff/60000)+"m ago";
  if(diff<86400000)return Math.floor(diff/3600000)+"h ago";
  if(diff<604800000)return Math.floor(diff/86400000)+"d ago";
  return date.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" • "+date.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
};

const removeBackground=(dataUrl,tolerance)=>new Promise(resolve=>{
  const img=new window.Image();
  img.onload=()=>{
    const W=Math.min(img.width,600),H=Math.round(img.height*W/img.width);
    const canvas=document.createElement("canvas");canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext("2d");ctx.drawImage(img,0,0,W,H);
    const d=ctx.getImageData(0,0,W,H),px=d.data;
    const get=(x,y)=>{const i=(y*W+x)*4;return[px[i],px[i+1],px[i+2]];};
    const pts=[[0,0],[W-1,0],[0,H-1],[W-1,H-1],[~~(W/2),0],[0,~~(H/2)],[W-1,~~(H/2)],[~~(W/2),H-1]];
    const avg=arr=>Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
    const samples=pts.map(([x,y])=>get(x,y));
    const bgR=avg(samples.map(s=>s[0])),bgG=avg(samples.map(s=>s[1])),bgB=avg(samples.map(s=>s[2]));
    for(let i=0;i<px.length;i+=4){const dist=Math.sqrt((px[i]-bgR)**2+(px[i+1]-bgG)**2+(px[i+2]-bgB)**2);if(dist<tolerance)px[i+3]=0;else if(dist<tolerance+25)px[i+3]=Math.round(255*(dist-tolerance)/25);}
    ctx.putImageData(d,0,0);resolve(canvas.toDataURL("image/png"));
  };img.src=dataUrl;
});

const compressImage=(dataUrl,maxW=500,quality=0.6)=>new Promise(resolve=>{
  const img=new window.Image();
  img.onload=()=>{
    const W=Math.min(img.width,maxW),H=Math.round(img.height*W/img.width);
    const canvas=document.createElement("canvas");canvas.width=W;canvas.height=H;
    canvas.getContext("2d").drawImage(img,0,0,W,H);
    resolve(canvas.toDataURL("image/jpeg",quality));
  };
  img.src=dataUrl;
});

const DraggableItem=({item,containerRef,onMove,onRemove,isOwner})=>{
  const ref=useRef();const dragging=useRef(false);const offset=useRef({x:0,y:0});
  const getXY=e=>{const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};};
  const startDrag=e=>{if(!isOwner)return;e.preventDefault();dragging.current=true;const rect=ref.current.getBoundingClientRect();const{x,y}=getXY(e);offset.current={x:x-rect.left,y:y-rect.top};window.addEventListener("mousemove",onDrag);window.addEventListener("mouseup",stopDrag);window.addEventListener("touchmove",onDrag,{passive:false});window.addEventListener("touchend",stopDrag);};
  const onDrag=e=>{if(!dragging.current)return;e.preventDefault();const cRect=containerRef.current.getBoundingClientRect();const{x,y}=getXY(e);onMove(item.id,Math.max(0,Math.min(85,((x-cRect.left-offset.current.x)/cRect.width)*100)),Math.max(0,Math.min(85,((y-cRect.top-offset.current.y)/cRect.height)*100)));};
  const stopDrag=()=>{dragging.current=false;window.removeEventListener("mousemove",onDrag);window.removeEventListener("mouseup",stopDrag);window.removeEventListener("touchmove",onDrag);window.removeEventListener("touchend",stopDrag);};
  const isImage=typeof item.content==="string"?item.content.startsWith("data:"):item.url&&item.url.startsWith("data:");
  const src=item.content||item.url;
  return(
    <div ref={ref} onMouseDown={startDrag} onTouchStart={startDrag} onDoubleClick={()=>isOwner&&onRemove(item.id)}
      style={{position:"absolute",left:`${item.x}%`,top:`${item.y}%`,cursor:isOwner?"grab":"default",userSelect:"none",zIndex:10,filter:"drop-shadow(0 2px 6px rgba(0,0,0,0.15))"}}>
      {isImage?<img src={src} alt="" style={{width:item.w||80,height:"auto",maxWidth:200,pointerEvents:"none",borderRadius:item.content?0:8}}/>:<span style={{fontSize:32}}>{src}</span>}
    </div>
  );
};

const StickerCreator=({onAdd})=>{
  const[original,setOriginal]=useState(null);const[processed,setProcessed]=useState(null);const[tolerance,setTolerance]=useState(40);const[processing,setProcessing]=useState(false);
  const process=async()=>{if(!original)return;setProcessing(true);const r=await removeBackground(original,tolerance);setProcessed(r);setProcessing(false);};

    <div style={{padding:16}}>
      <p style={{fontSize:13,color:"#888",marginBottom:12}}>Upload a photo to create a custom sticker.</p>
      <FileUploadBtn onFile={d=>{setOriginal(d);setProcessed(null);}} label="Upload Photo" color="#C8A8E9"/>

        <input type="range" min={10} max={120} value={tolerance} onChange={e=>setTolerance(+e.target.value)} style={{width:"100%",accentColor:"#C8A8E9",marginBottom:12}}/>
        <div style={{display:"flex",gap:8}}>
          <PillBtn onClick={process} color="#8ECFC4" disabled={processing}>{processing?"Processing…":"Remove BG"}</PillBtn>

      </div>}

  );
};

const CalendarPage=({entries,members,currentMember,onGoToEntry})=>{
  const[year,setYear]=useState(new Date().getFullYear());const[month,setMonth]=useState(new Date().getMonth());
  const[selectedDay,setSelectedDay]=useState(null);
  const daysInMonth=new Date(year,month+1,0).getDate();const firstDay=new Date(year,month,1).getDay();
  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dayNames=["Su","Mo","Tu","We","Th","Fr","Sa"];
  const visible=entries.filter(e=>!e.isDraft&&(e.authorId===currentMember.id||e.privacy==="friends"));
  const dayM={};visible.forEach(e=>{const d=new Date(e.date);if(d.getFullYear()===year&&d.getMonth()===month){const day=d.getDate();if(!dayM[day])dayM[day]=new Set();dayM[day].add(e.authorId);}});
  const actC={};visible.forEach(e=>{const d=new Date(e.date);if(d.getFullYear()===year&&d.getMonth()===month)actC[e.authorId]=(actC[e.authorId]||0)+1;});
  const mostActive=members.map(m=>({member:m,count:actC[m.id]||0})).sort((a,b)=>b.count-a.count).filter(x=>x.count>0);
  return(
    <div style={{padding:16,paddingBottom:100}}>
      <h2 className="ds" style={{fontSize:28,color:"#d4608a",marginBottom:16}}>Calendar</h2>
      <GlassCard style={{padding:20,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <button onClick={()=>month===0?(setMonth(11),setYear(y=>y-1)):setMonth(m=>m-1)} style={{background:"rgba(244,167,185,0.15)",border:"none",cursor:"pointer",color:"#d4608a",width:36,height:36,borderRadius:"50%",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <h3 className="ds" style={{fontSize:22,color:"#d4608a"}}>{monthNames[month]} {year}</h3>
          <button onClick={()=>month===11?(setMonth(0),setYear(y=>y+1)):setMonth(m=>m+1)} style={{background:"rgba(244,167,185,0.15)",border:"none",cursor:"pointer",color:"#d4608a",width:36,height:36,borderRadius:"50%",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:8}}>
          {dayNames.map(d=><p key={d} style={{textAlign:"center",fontSize:11,color:"#c8a8e9",fontWeight:700}}>{d}</p>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
          {Array(firstDay).fill(null).map((_,i)=><div key={`e${i}`}/>)}
          {Array(daysInMonth).fill(null).map((_,i)=>{
            const day=i+1;const mids=dayM[day]?[...dayM[day]]:[];const has=mids.length>0;
            const isToday=new Date().getDate()===day&&new Date().getMonth()===month&&new Date().getFullYear()===year;
            return<div key={day} onClick={()=>has&&setSelectedDay(selectedDay===day?null:day)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 2px",borderRadius:12,background:selectedDay===day?"linear-gradient(135deg,#F4A7B9,#C8A8E9)":isToday?"linear-gradient(135deg,#F4A7B9,#C8A8E9)":has?"rgba(244,167,185,0.12)":"transparent",cursor:has?"pointer":"default"}}>
              <span style={{fontSize:13,fontWeight:has||isToday?700:400,color:isToday||selectedDay===day?"#fff":has?"#d4608a":"#888"}}>{day}</span>
              {has&&<div style={{display:"flex",gap:1,flexWrap:"wrap",justifyContent:"center"}}>{mids.slice(0,3).map(mid=>{const m=members.find(x=>x.id===mid);return m?<div key={mid} style={{width:14,height:14,borderRadius:"50%",background:m.color,border:"1px solid #fff",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:700,color:"#fff"}}>{m.profilePic?<img src={m.profilePic} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:m.avatar}</div>:null;})}</div>}
            </div>;
          })}
        </div>
      </GlassCard>
      {selectedDay&&(()=>{
        const dayEntries=visible.filter(e=>{const d=new Date(e.date);return d.getFullYear()===year&&d.getMonth()===month&&d.getDate()===selectedDay;});
        return<GlassCard style={{padding:16,marginBottom:16}} className="fade-in">
          <h3 style={{fontSize:14,fontWeight:700,color:"#d4608a",marginBottom:12}}>📅 {monthNames[month]} {selectedDay}</h3>
          {dayEntries.map(e=>{const author=members.find(m=>m.id===e.authorId);if(!author)return null;const long=e.body&&e.body.length>80;return<div key={e.id} onClick={()=>onGoToEntry&&onGoToEntry(e.id)} style={{display:"flex",gap:10,padding:"10px 12px",borderRadius:14,background:"rgba(244,167,185,0.07)",marginBottom:8,cursor:"pointer",border:"1px solid rgba(244,167,185,0.15)"}}>
            <Avatar member={author} size={32}/>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontWeight:700,fontSize:13,color:"#555",marginBottom:2}}>{e.title}</p>
              <p style={{fontSize:12,color:"#888",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{long?e.body.slice(0,80)+"…":e.body}</p>
            </div>
            <Ico name="Back" size={16} color="#F4A7B9" style={{transform:"rotate(180deg)",flexShrink:0}}/>
          </div>;})}
        </GlassCard>;
      })()}
      {mostActive.length>0&&<GlassCard style={{padding:16}}>
        <h3 style={{fontSize:14,fontWeight:700,color:"#d4608a",marginBottom:12}}>⭐ Most Active This Month</h3>
        {mostActive.map(({member:m,count},idx)=><div key={m.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <span style={{fontSize:16,width:24,textAlign:"center",color:"#d4608a",fontWeight:700}}>{idx===0?"🥇":idx===1?"🥈":idx===2?"🥉":`${idx+1}.`}</span>
          <Avatar member={m} size={34}/>
          <div style={{flex:1}}><p style={{fontSize:14,fontWeight:700,color:"#444"}}>{m.name}</p><div style={{height:6,borderRadius:999,background:"rgba(244,167,185,0.2)",marginTop:3,overflow:"hidden"}}><div style={{height:"100%",borderRadius:999,background:`linear-gradient(90deg,${m.color},#F4A7B9)`,width:`${Math.min(100,(count/(mostActive[0]?.count||1))*100)}%`}}/></div></div>
          <span style={{fontSize:13,fontWeight:700,color:"#d4608a"}}>{count}</span>
        </div>)}
      </GlassCard>}
    </div>
  );
};

const MediaPage=({entries,members,currentMember,onGoToEntry})=>{
  const allMedia=entries.filter(e=>e.privacy==="friends"||e.authorId===currentMember.id).flatMap(e=>(e.images||[]).map(img=>({...img,authorId:e.authorId,entryId:e.id})));
  return<div style={{padding:16,paddingBottom:80}}>
    <h2 className="ds" style={{fontSize:28,color:"#d4608a",marginBottom:16}}>Media</h2>
    {allMedia.length===0?<p style={{textAlign:"center",color:"#ccc",padding:32}}>No photos yet 📸</p>:
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
      {allMedia.map(img=>{const author=members.find(m=>m.id===img.authorId);return<div key={img.id} onClick={()=>onGoToEntry&&onGoToEntry(img.entryId)} style={{position:"relative",borderRadius:16,overflow:"hidden",aspectRatio:"1",cursor:"pointer"}}><img src={img.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>{author&&<div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.4))",padding:"4px 6px"}}><Avatar member={author} size={18}/></div>}</div>;})}
    </div>}
  </div>;
};

const MembersPage=({members,entries,onViewProfile})=>(
  <div style={{padding:16,paddingBottom:80}}>
    <h2 className="ds" style={{fontSize:28,color:"#d4608a",marginBottom:16}}>Members</h2>
    {members.map(m=><GlassCard key={m.id} style={{padding:16,marginBottom:12,cursor:"pointer"}} className="fade-in" onClick={()=>onViewProfile(m)}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <Avatar member={m} size={52}/>
        <div style={{flex:1}}><p style={{fontWeight:700,fontSize:16,color:"#444"}}>{m.name}</p><p style={{fontSize:12,color:"#aaa"}}>@{m.username}</p>{m.bio&&<p style={{fontSize:13,color:"#888",marginTop:2}}>{m.bio}</p>}</div>
        <div style={{textAlign:"center"}}><p style={{fontWeight:700,color:"#d4608a"}}>{entries.filter(e=>e.authorId===m.id&&!e.isDraft).length}</p><p style={{fontSize:11,color:"#aaa"}}>entries</p></div>
      </div>
    </GlassCard>)}
  </div>
);

const NotificationsPanel=({entries,members,currentMember,onClose,readNotifIds,onMarkRead,onGoToEntry})=>{
  const notifs=entries.filter(e=>e.authorId===currentMember.id).flatMap(e=>[
    ...e.likes.filter(l=>l!==currentMember.id).map(l=>({id:`l${e.id}${l}`,type:"like",entry:e,actor:members.find(m=>m.id===l),date:e.date})),
    ...e.comments.filter(c=>c.authorId!==currentMember.id).map(c=>({id:`c${c.id}`,type:"comment",entry:e,actor:members.find(m=>m.id===c.authorId),comment:c,date:c.date}))
  ]).filter(n=>n.actor).sort((a,b)=>new Date(b.date)-new Date(a.date));
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.3)",zIndex:999}} onClick={onClose}>
      <div style={{position:"absolute",top:60,right:16,width:310,background:"rgba(255,255,255,0.97)",borderRadius:20,boxShadow:"0 8px 32px rgba(244,167,185,0.3)",maxHeight:"70vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"16px 16px 12px",borderBottom:"1px solid rgba(244,167,185,0.2)"}}><h3 style={{fontSize:16,fontWeight:700,color:"#d4608a"}}>Notifications</h3></div>
        {notifs.length===0?<p style={{textAlign:"center",color:"#ccc",padding:24,fontSize:14}}>No notifications yet</p>:notifs.map(n=>{
          const isUnread=!readNotifIds.has(n.id);
          return<div key={n.id} onClick={()=>{onMarkRead([n.id]);onGoToEntry(n.entry.id);onClose();}} style={{display:"flex",gap:10,padding:"12px 16px",borderBottom:"1px solid rgba(244,167,185,0.1)",cursor:"pointer",background:isUnread?"rgba(244,167,185,0.08)":"transparent",alignItems:"flex-start"}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:isUnread?"#e05c8a":"transparent",flexShrink:0,marginTop:6}}/>
            <Avatar member={n.actor} size={36}/>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:13,color:"#555"}}><strong>{n.actor.name}</strong> {n.type==="like"?"liked":"commented on"} your entry</p>
              <p className="ds" style={{fontSize:13,color:"#d4608a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.entry.title}</p>
              {n.type==="comment"&&<p style={{fontSize:12,color:"#888",fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>"{n.comment.text}"</p>}
              <p style={{fontSize:10,color:"#c0b0b8",marginTop:2}}>{fmtDate(n.date)}</p>
            </div>
          </div>;
        })}
      </div>
    </div>
  );
};

const LoginPage=({members,onLogin})=>{
  const[username,setUsername]=useState("");const[password,setPassword]=useState("");const[error,setError]=useState("");const[showPass,setShowPass]=useState(false);
  const login=()=>{const m=members.find(m=>m.username===username.toLowerCase().trim()&&m.password===password);if(m)onLogin(m);else setError("Invalid username or password");};
  return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <PolkaBg/>
    <GlassCard style={{width:"100%",maxWidth:360,padding:36}} className="pop">
      <h1 className="ds" style={{fontSize:44,textAlign:"center",color:"#d4608a",marginBottom:4}}>Dear Diary</h1>
      <p style={{textAlign:"center",fontSize:14,color:"#bbb",marginBottom:28}}>Your private space ✨</p>
      <div style={{display:"flex",justifyContent:"center",gap:12,marginBottom:28}}>
        {members.map(m=><button key={m.id} onClick={()=>setUsername(m.username)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,background:"none",border:"none",cursor:"pointer"}}>
          <Avatar member={m} size={50} style={{border:username===m.username?`3px solid ${m.color}`:"3px solid transparent"}}/>
          <span style={{fontSize:12,color:username===m.username?m.color:"#aaa",fontWeight:600}}>{m.name}</span>
        </button>)}
      </div>
      <label style={{fontSize:13,color:"#aaa",display:"block",marginBottom:4}}>Username</label>
      <input value={username} onChange={e=>{setUsername(e.target.value);setError("");}} placeholder="e.g. hanoof" onKeyDown={e=>e.key==="Enter"&&login()} style={{width:"100%",border:"1px solid rgba(244,167,185,0.4)",borderRadius:14,padding:"10px 16px",fontSize:15,outline:"none",background:"rgba(255,255,255,0.85)",marginBottom:14}}/>
      <label style={{fontSize:13,color:"#aaa",display:"block",marginBottom:4}}>Password</label>
      <div style={{position:"relative",marginBottom:20}}>
        <input value={password} onChange={e=>{setPassword(e.target.value);setError("");}} type={showPass?"text":"password"} placeholder="••••" onKeyDown={e=>e.key==="Enter"&&login()} style={{width:"100%",border:"1px solid rgba(244,167,185,0.4)",borderRadius:14,padding:"10px 40px 10px 16px",fontSize:15,outline:"none",background:"rgba(255,255,255,0.85)"}}/>
        <button onClick={()=>setShowPass(!showPass)} style={{position:"absolute",right:12,top:10,background:"none",border:"none",cursor:"pointer",color:"#bbb"}}><Ico name={showPass?"EyeOff":"Eye"} size={16}/></button>
      </div>
      {error&&<p style={{color:"#e05c8a",fontSize:13,textAlign:"center",marginBottom:12}}>{error}</p>}
      <PillBtn onClick={login} color="#F4A7B9" style={{width:"100%",justifyContent:"center",padding:"12px"}}>Enter Diary ✨</PillBtn>
    </GlassCard>
  </div>;
};

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const[members,setMembers]=useState(MEMBERS_INIT);
  const[entries,setEntries]=useState([]);
  const[homeBanner,setHomeBanner]=useState(null);
  const[loading,setLoading]=useState(true);
  const[currentMember,setCurrentMember]=useState(()=>{try{const v=localStorage.getItem("dd_currentMember");return v?JSON.parse(v):null;}catch{return null;}});
  const[page,setPage]=useState("home");
  const[showNewEntry,setShowNewEntry]=useState(false);
  const[showNotifs,setShowNotifs]=useState(false);
  const[searchQuery,setSearchQuery]=useState("");
  const[showSearch,setShowSearch]=useState(false);
  const[viewingProfile,setViewingProfile]=useState(null);
  const[editingSettings,setEditingSettings]=useState(false);
  const[readNotifIds,setReadNotifIds]=useState(()=>new Set(lsLoad("dd_readNotifs",[])));
  const[highlightEntryId,setHighlightEntryId]=useState(null);
  const[inputFocused,setInputFocused]=useState(false);

  // Save current member & readNotifs locally only (per-device)
  useEffect(()=>{try{localStorage.setItem("dd_currentMember",JSON.stringify(currentMember));}catch{}},[currentMember]);
  useEffect(()=>{lsSave("dd_readNotifs",[...readNotifIds]);},[readNotifIds]);

  // Firebase real-time listeners
  useEffect(()=>{
    const configRef=db.collection("diary").doc("config");
    const unsubConfig=configRef.onSnapshot(snap=>{
      if(snap.exists){
        const data=snap.data();
        if(data.members)setMembers(data.members);
        setHomeBanner(data.banner||null);
      } else {
        configRef.set({members:MEMBERS_INIT,banner:null});
      }
      setLoading(false);
    },()=>setLoading(false));

    const unsubEntries=db.collection("diary-entries").orderBy("date","desc").onSnapshot(snap=>{
      setEntries(snap.docs.map(d=>d.data()));
    });

    return()=>{unsubConfig();unsubEntries();};
  },[]);

  // Focus tracking (hide FAB)
  useEffect(()=>{
    const onIn=e=>{if(["INPUT","TEXTAREA"].includes(e.target.tagName))setInputFocused(true);};
    const onOut=e=>{if(["INPUT","TEXTAREA"].includes(e.target.tagName))setInputFocused(false);};
    window.addEventListener("focusin",onIn);window.addEventListener("focusout",onOut);
    return()=>{window.removeEventListener("focusin",onIn);window.removeEventListener("focusout",onOut);};
  },[]);

  // Scroll to highlighted entry
  useEffect(()=>{
    if(!highlightEntryId)return;
    const t=setTimeout(()=>{const el=document.querySelector('[data-entry-id="'+highlightEntryId+'"]');if(el)el.scrollIntoView({behavior:"smooth",block:"center"});},150);
    const c=setTimeout(()=>setHighlightEntryId(null),3500);
    return()=>{clearTimeout(t);clearTimeout(c);};
  },[highlightEntryId]);

  const me=currentMember?members.find(m=>m.id===currentMember.id):null;

  // All writes go to Firebase
  const saveEntry=entry=>{
    db.collection("diary-entries").doc(String(entry.id)).set(entry);
    setShowNewEntry(false);
  };
  const deleteEntry=id=>db.collection("diary-entries").doc(String(id)).delete();

  const likeEntry=id=>{
    const entry=entries.find(e=>e.id===id);if(!entry)return;
    const likes=entry.likes.includes(me.id)?entry.likes.filter(l=>l!==me.id):[...entry.likes,me.id];
    db.collection("diary-entries").doc(String(id)).update({likes});
  };
  const commentEntry=(id,comment)=>{
    const entry=entries.find(e=>e.id===id);if(!entry)return;
    db.collection("diary-entries").doc(String(id)).update({comments:[...entry.comments,comment]});
  };
  const updateMember=updated=>{
    const newMembers=members.map(m=>m.id===updated.id?updated:m);
    db.collection("diary").doc("config").update({members:newMembers});
    setCurrentMember(updated);
  };
  const updateBanner=banner=>{
    db.collection("diary").doc("config").update({banner});
    setHomeBanner(banner);
  };
  const logout=()=>{setCurrentMember(null);setPage("home");setViewingProfile(null);setEditingSettings(false);};

  const likeComment=(entryId,commentId)=>{
    const entry=entries.find(e=>e.id===entryId);if(!entry)return;
    const comments=entry.comments.map(c=>{if(c.id!==commentId)return c;const likes=(c.likes||[]).includes(me.id)?(c.likes||[]).filter(l=>l!==me.id):[...(c.likes||[]),me.id];return{...c,likes};});
    db.collection("diary-entries").doc(String(entryId)).update({comments});
  };
  const replyToComment=(entryId,commentId,text)=>{
    const entry=entries.find(e=>e.id===entryId);if(!entry)return;
    const reply={id:Date.now(),authorId:me.id,text,date:new Date().toISOString(),likes:[]};
    const comments=entry.comments.map(c=>c.id===commentId?{...c,replies:[...(c.replies||[]),reply]}:c);
    db.collection("diary-entries").doc(String(entryId)).update({comments});
  };
  const likeReply=(entryId,commentId,replyId)=>{
    const entry=entries.find(e=>e.id===entryId);if(!entry)return;
    const comments=entry.comments.map(c=>{if(c.id!==commentId)return c;const replies=(c.replies||[]).map(r=>{if(r.id!==replyId)return r;const likes=(r.likes||[]).includes(me.id)?(r.likes||[]).filter(l=>l!==me.id):[...(r.likes||[]),me.id];return{...r,likes};});return{...c,replies};});
    db.collection("diary-entries").doc(String(entryId)).update({comments});
  };

  const markNotifsRead=ids=>setReadNotifIds(prev=>new Set([...prev,...ids]));
  const goToEntry=entryId=>{setShowNotifs(false);setPage("home");setHighlightEntryId(entryId);};

  const notifCount=me?(()=>{
    const allIds=entries.filter(e=>e.authorId===me.id).flatMap(e=>[...e.likes.filter(l=>l!==me.id).map(l=>`l${e.id}${l}`),...e.comments.filter(c=>c.authorId!==me.id).map(c=>`c${c.id}`)]);
    return allIds.filter(id=>!readNotifIds.has(id)).length;
  })():0;

  const visible=entries.filter(e=>{
    if(e.isDraft&&e.authorId!==me?.id)return false;
    if(e.privacy==="private"&&e.authorId!==me?.id)return false;
    if(searchQuery){const q=searchQuery.toLowerCase();return e.title.toLowerCase().includes(q)||e.body.toLowerCase().includes(q);}
    return true;
  });

  // Loading screen
  if(loading)return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#fff5f8"}}>
      <PolkaBg/>
      <h1 className="ds" style={{fontSize:48,color:"#d4608a",marginBottom:16}}>Dear Diary</h1>
      <div style={{width:36,height:36,border:"3px solid #F4A7B9",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    </div>
  );

  if(!me)return<><PolkaBg/><LoginPage members={members} onLogin={m=>setCurrentMember(m)}/></>;
  if(editingSettings)return<><PolkaBg/><div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh"}}><SettingsPage member={me} onUpdate={updateMember} onBack={()=>setEditingSettings(false)}/></div></>;
  if(viewingProfile){
    const isOwn=viewingProfile.id===me.id;
    return<><PolkaBg/><div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh"}}>
      <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(255,245,248,0.85)",backdropFilter:"blur(12px)",padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>setViewingProfile(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#d4608a"}}><Ico name="Back" size={24}/></button>
        <span style={{fontWeight:700,color:"#444"}}>{viewingProfile.name}</span>
      </div>
      <ProfilePage member={members.find(m=>m.id===viewingProfile.id)||viewingProfile} entries={entries} members={members} currentMember={me} onEdit={()=>{setEditingSettings(true);setViewingProfile(null);}} isOwn={isOwn}/>
    </div></>;
  }

  const navItems=[{id:"home",icon:"Home",label:"Home"},{id:"diaries",icon:"Book",label:"Diaries"},{id:"media",icon:"Img",label:"Media"},{id:"calendar",icon:"Cal",label:"Calendar"},{id:"members",icon:"Users",label:"Members"}];
  const[viewingEntry,setViewingEntry]=useState(null);
  const eProps=(e,withNav=false)=>({key:e.id,entry:e,members,currentMember:me,onLike:likeEntry,onComment:commentEntry,onDelete:deleteEntry,onLikeComment:cid=>likeComment(e.id,cid),onReplyComment:(cid,text)=>replyToComment(e.id,cid,text),onLikeReply:(cid,rid)=>likeReply(e.id,cid,rid),highlighted:e.id===highlightEntryId,onViewFull:e=>setViewingEntry(e),...(withNav?{onCardClick:()=>setPage("diaries"),onAvatarClick:m=>setViewingProfile(m)}:{})});

  return<><PolkaBg/>
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",position:"relative"}}>
      <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(255,245,248,0.9)",backdropFilter:"blur(12px)",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(244,167,185,0.2)"}}>
        <h1 className="ds" style={{fontSize:24,color:"#d4608a"}}>Dear Diary</h1>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {showSearch&&<input autoFocus value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="Search entries…" style={{border:"1px solid rgba(244,167,185,0.4)",borderRadius:999,padding:"6px 14px",fontSize:13,outline:"none",background:"rgba(255,255,255,0.85)"}}/>}
          <button onClick={()=>{setShowSearch(!showSearch);if(showSearch)setSearchQuery("");}} style={{background:"none",border:"none",cursor:"pointer",color:"#d4608a"}}><Ico name="Search" size={20}/></button>
          <button onClick={()=>setShowNotifs(!showNotifs)} style={{background:"none",border:"none",cursor:"pointer",color:"#d4608a",position:"relative"}}>
            <Ico name="Bell" size={20}/>
            {notifCount>0&&<span style={{position:"absolute",top:-4,right:-4,background:"#e05c8a",color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{notifCount}</span>}
          </button>
          <button onClick={()=>setViewingProfile(me)} style={{background:"none",border:"none",cursor:"pointer"}}><Avatar member={me} size={32}/></button>
          <button onClick={logout} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc"}}><Ico name="Out" size={18}/></button>
        </div>
      </div>
      <div>
        {page==="home"&&<div style={{padding:16,paddingBottom:80}}>
          <HomeBanner bannerImage={homeBanner} onBannerChange={updateBanner}/>
          {entries.filter(e=>e.isDraft&&e.authorId===me.id).length>0&&<div style={{marginBottom:16}}>
            <h3 style={{fontSize:14,color:"#aaa",fontWeight:700,marginBottom:8}}>✏️ Drafts</h3>
            {entries.filter(e=>e.isDraft&&e.authorId===me.id).map(e=><EntryCard {...eProps(e,true)}/>)}
          </div>}
          {visible.filter(e=>!e.isDraft).length===0
            ?<GlassCard style={{padding:40,textAlign:"center"}}><p className="ds" style={{fontSize:24,color:"#d4608a",marginBottom:8}}>Start writing!</p><p style={{color:"#bbb",fontSize:14}}>Tap the + button to create your first entry</p></GlassCard>
            :visible.filter(e=>!e.isDraft).map(e=><EntryCard {...eProps(e,true)}/>)}
        </div>}
        {page==="diaries"&&<div style={{padding:16,paddingBottom:100}}>
          <h2 className="ds" style={{fontSize:28,color:"#d4608a",marginBottom:16}}>Diaries</h2>
          {visible.filter(e=>!e.isDraft).length===0?<GlassCard style={{padding:40,textAlign:"center"}}><p className="ds" style={{fontSize:24,color:"#d4608a",marginBottom:8}}>No entries yet</p><p style={{color:"#bbb",fontSize:14}}>Be the first to write something ✨</p></GlassCard>:visible.filter(e=>!e.isDraft).map(e=><EntryCard {...eProps(e)}/>)}
        </div>}
        {page==="media"&&<MediaPage entries={entries} members={members} currentMember={me} onGoToEntry={id=>{goToEntry(id);setPage("diaries");}}/>}
        {page==="calendar"&&<CalendarPage entries={entries} members={members} currentMember={me} onGoToEntry={id=>{goToEntry(id);setPage("diaries");}}/>}
        {page==="members"&&<MembersPage members={members} entries={entries} onViewProfile={m=>setViewingProfile(m)}/>}
      </div>
      {!inputFocused&&<button onClick={()=>setShowNewEntry(true)} style={{position:"fixed",bottom:92,right:"max(16px, calc(50% - 224px))",width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,#F4A7B9,#C8A8E9)",border:"none",cursor:"pointer",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(244,167,185,0.5)",zIndex:90}}>
        <Ico name="Plus" size={24} color="#fff"/>
      </button>}
      <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",display:"flex",alignItems:"center",gap:4,background:"rgba(255,255,255,0.92)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderRadius:999,border:"1px solid rgba(244,167,185,0.3)",boxShadow:"0 8px 32px rgba(244,167,185,0.25)",padding:"6px 10px",zIndex:100}}>
        {navItems.map(n=><button key={n.id} onClick={()=>setPage(n.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"7px 14px",borderRadius:999,border:"none",cursor:"pointer",background:page===n.id?"#fff":"transparent",boxShadow:page===n.id?"0 0 0 2px #F4A7B9":"none",color:page===n.id?"#d4608a":"#bbb",transition:"all 0.2s",minWidth:52}}>
          <Ico name={n.icon} size={20} color={page===n.id?"#d4608a":"#bbb"}/><span style={{fontSize:9,fontWeight:700}}>{n.label}</span>
        </button>)}
      </div>
      {showNewEntry&&<NewEntryModal member={me} onSave={saveEntry} onClose={()=>setShowNewEntry(false)}/>}
      {showNotifs&&<NotificationsPanel entries={entries} members={members} currentMember={me} onClose={()=>setShowNotifs(false)} readNotifIds={readNotifIds} onMarkRead={markNotifsRead} onGoToEntry={goToEntry}/>}
      {viewingEntry&&<EntryReadModal entry={viewingEntry} members={members} onClose={()=>setViewingEntry(null)}/>}
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
