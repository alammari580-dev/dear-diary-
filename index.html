// ── Background Removal
const removeBackground = (dataUrl, tolerance) => new Promise(resolve => {
  const img = new window.Image();
  img.onload = () => {
    const W = Math.min(img.width, 600);
    const H = Math.round(img.height * W / img.width);
    const canvas = document.createElement("canvas");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, W, H);
    const d = ctx.getImageData(0, 0, W, H);
    const px = d.data;
    const get = (x,y) => { const i=(y*W+x)*4; return [px[i],px[i+1],px[i+2]]; };
    const pts = [[0,0],[W-1,0],[0,H-1],[W-1,H-1],[~~(W/2),0],[0,~~(H/2)],[W-1,~~(H/2)],[~~(W/2),H-1]];
    const avg = arr => Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
    const samples = pts.map(([x,y])=>get(x,y));
    const bgR=avg(samples.map(s=>s[0])), bgG=avg(samples.map(s=>s[1])), bgB=avg(samples.map(s=>s[2]));
    for(let i=0;i<px.length;i+=4){
      const dist=Math.sqrt((px[i]-bgR)**2+(px[i+1]-bgG)**2+(px[i+2]-bgB)**2);
      if(dist<tolerance) px[i+3]=0;
      else if(dist<tolerance+25) px[i+3]=Math.round(255*(dist-tolerance)/25);
    }
    ctx.putImageData(d,0,0);
    resolve(canvas.toDataURL("image/png"));
  };
  img.src=dataUrl;
});

// ── File Upload Button
const FileUploadBtn = ({ onFile, accept="image/*", label, color="#F4A7B9", style={} }) => {
  const ref = useRef();
  const handle = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => onFile(ev.target.result);
    reader.readAsDataURL(file);
    e.target.value="";
  };
  return (
    <>
      <input ref={ref} type="file" accept={accept} style={{display:"none"}} onChange={handle}/>
      <PillBtn onClick={() => ref.current.click()} color={color} style={style}>
        <Upload size={14}/> {label}
      </PillBtn>
    </>
  );
};

// ── Paper Background
const paperStyle = (type, color) => {
  const base = { background:color, minHeight:300, position:"relative", borderRadius:16, padding:16 };
  if(type==="lined") return { ...base, backgroundImage:`linear-gradient(${color} 95%, #e0c8d0 100%)`, backgroundSize:"100% 28px" };
  if(type==="dotted") return { ...base, backgroundImage:`radial-gradient(circle, #c9aab5 1px, transparent 1px)`, backgroundSize:"20px 20px" };
  if(type==="grid") return { ...base, backgroundImage:`linear-gradient(rgba(200,168,233,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(200,168,233,0.3) 1px, transparent 1px)`, backgroundSize:"20px 20px" };
  return base;
};

// ── DraggableItem
const DraggableItem = ({ item, containerRef, onMove, onRemove, isOwner }) => {
  const ref = useRef();
  const dragging = useRef(false);
  const offset = useRef({x:0,y:0});
  const getXY = e => { const t=e.touches?e.touches[0]:e; return {x:t.clientX,y:t.clientY}; };
  const startDrag = e => {
    if(!isOwner) return;
    e.preventDefault();
    dragging.current=true;
    const rect=ref.current.getBoundingClientRect();
    const {x,y}=getXY(e);
    offset.current={x:x-rect.left,y:y-rect.top};
    window.addEventListener("mousemove",onDrag);
    window.addEventListener("mouseup",stopDrag);
    window.addEventListener("touchmove",onDrag,{passive:false});
    window.addEventListener("touchend",stopDrag);
  };
  const onDrag = e => {
    if(!dragging.current) return;
    e.preventDefault();
    const cRect=containerRef.current.getBoundingClientRect();
    const {x,y}=getXY(e);
    const nx=((x-cRect.left-offset.current.x)/cRect.width)*100;
    const ny=((y-cRect.top-offset.current.y)/cRect.height)*100;
    onMove(item.id,Math.max(0,Math.min(85,nx)),Math.max(0,Math.min(85,ny)));
  };
  const stopDrag = () => {
    dragging.current=false;
    window.removeEventListener("mousemove",onDrag);
    window.removeEventListener("mouseup",stopDrag);
    window.removeEventListener("touchmove",onDrag);
    window.removeEventListener("touchend",stopDrag);
  };
  const isImage = typeof item.content==="string"
    ? item.content.startsWith("data:")
    : item.url && item.url.startsWith("data:");
  const src = item.content||item.url;
  const w = item.w||80;
  return (
    <div ref={ref} onMouseDown={startDrag} onTouchStart={startDrag}
      onDoubleClick={() => isOwner && onRemove(item.id)}
      style={{ position:"absolute", left:`${item.x}%`, top:`${item.y}%`,
        cursor:isOwner?"grab":"default", userSelect:"none", zIndex:10,
        filter:"drop-shadow(0 2px 6px rgba(0,0,0,0.15))" }}
      title={isOwner?"Double-click to remove":""}>
      {isImage
        ? <img src={src} alt="" style={{width:w,height:"auto",maxWidth:200,pointerEvents:"none",borderRadius:item.content?0:8}}/>
        : <span style={{fontSize:32}}>{src}</span>}
    </div>
  );
};

// ── Sticker Creator
const StickerCreator = ({ onAdd }) => {
  const [original, setOriginal] = useState(null);
  const [processed, setProcessed] = useState(null);
  const [tolerance, setTolerance] = useState(40);
  const [processing, setProcessing] = useState(false);
  const handleFile = dataUrl => { setOriginal(dataUrl); setProcessed(null); };
  const process = async () => {
    if(!original) return;
    setProcessing(true);
    const result = await removeBackground(original, tolerance);
    setProcessed(result);
    setProcessing(false);
  };
  const addSticker = () => {
    if(!processed&&!original) return;
    onAdd({id:Date.now(),content:processed||original,x:10,y:10});
    setOriginal(null); setProcessed(null);
  };
  return (
    <div style={{padding:16}}>
      <p style={{fontSize:13,color:"#888",marginBottom:12}}>Upload a photo to create a custom sticker. The background will be removed automatically.</p>
      <FileUploadBtn onFile={handleFile} label="Upload Photo" color="#C8A8E9"/>
      {original && (
        <div style={{marginTop:16}}>
          <div style={{display:"flex",gap:12,marginBottom:12}}>
            <div style={{flex:1,textAlign:"center"}}>
              <p style={{fontSize:11,color:"#aaa",marginBottom:4}}>Original</p>
              <img src={original} alt="orig" style={{maxWidth:"100%",maxHeight:120,borderRadius:8,objectFit:"contain"}}/>
            </div>
            {processed && (
              <div style={{flex:1,textAlign:"center"}}>
                <p style={{fontSize:11,color:"#aaa",marginBottom:4}}>Processed</p>
                <div style={{background:"repeating-conic-gradient(#ccc 0% 25%, #fff 0% 50%) 0 0 / 16px 16px",borderRadius:8,display:"inline-block"}}>
                  <img src={processed} alt="proc" style={{maxWidth:"100%",maxHeight:120,borderRadius:8,objectFit:"contain",display:"block"}}/>
                </div>
              </div>
            )}
          </div>
          <label style={{fontSize:13,color:"#666",display:"block",marginBottom:4}}>Tolerance: <strong>{tolerance}</strong></label>
          <input type="range" min={10} max={120} value={tolerance} onChange={e=>setTolerance(+e.target.value)} style={{width:"100%",accentColor:"#C8A8E9",marginBottom:12}}/>
          <div style={{display:"flex",gap:8}}>
            <PillBtn onClick={process} color="#8ECFC4" disabled={processing}>{processing?"Processing…":"Remove BG"}</PillBtn>
            <PillBtn onClick={addSticker} color="#F4A7B9" disabled={!original}>Add as Sticker</PillBtn>
          </div>
        </div>
      )}
    </div>
  );
};

            }}>{t.icon}{t.label}</button>
          ))}
        </div>
        <div style={{flex:1,overflowY:"auto"}}>
          {tab==="write" && (

// ── Home Banner
const HomeBanner = ({ bannerImage, onBannerChange }) => {
  const fileRef = useRef();
  const handle = e => {
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>onBannerChange(ev.target.result);
    reader.readAsDataURL(file);
    e.target.value="";
  };
  return (
    <div style={{position:"relative",borderRadius:24,overflow:"hidden",marginBottom:20,height:180,background:bannerImage?"transparent":"linear-gradient(135deg,#F4A7B9,#C8A8E9,#8ECFC4)"}}>

      <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.3))"}}/>

        <h1 className="ds" style={{fontSize:42,color:"#fff",textShadow:"0 2px 12px rgba(0,0,0,0.3)"}}>Dear Diary</h1>
      </div>
      <button onClick={()=>fileRef.current.click()} style={{position:"absolute",top:12,right:12,background:"rgba(255,255,255,0.85)",border:"none",borderRadius:"50%",width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>
        <Pencil size={15} color="#d4608a"/>

};

// ── Calendar Page
const CalendarPage = ({ entries, members, currentMember }) => {
  const [year, setYear] = useState(new Date().getFullYear());
  const [month, setMonth] = useState(new Date().getMonth());
  const daysInMonth = new Date(year,month+1,0).getDate();
  const firstDay = new Date(year,month,1).getDay();
  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dayNames = ["Su","Mo","Tu","We","Th","Fr","Sa"];
  const visibleEntries = entries.filter(e=>!e.isDraft&&(e.authorId===currentMember.id||e.privacy==="friends"));
  const dayMembers = {};
  visibleEntries.forEach(e=>{
    const d=new Date(e.date);
    if(d.getFullYear()===year&&d.getMonth()===month){
      const day=d.getDate();
      if(!dayMembers[day]) dayMembers[day]=new Set();
      dayMembers[day].add(e.authorId);
    }
  });
  const activityCount = {};
  visibleEntries.forEach(e=>{
    const d=new Date(e.date);
    if(d.getFullYear()===year&&d.getMonth()===month)
      activityCount[e.authorId]=(activityCount[e.authorId]||0)+1;
  });
  const mostActive = members.map(m=>({member:m,count:activityCount[m.id]||0})).sort((a,b)=>b.count-a.count).filter(x=>x.count>0);
  const prev = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const next = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };
  return (
    <div style={{padding:16,paddingBottom:100}}>
      <h2 className="ds" style={{fontSize:28,color:"#d4608a",marginBottom:16}}>Calendar</h2>
      <GlassCard style={{padding:20,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <button onClick={prev} style={{background:"rgba(244,167,185,0.15)",border:"none",cursor:"pointer",color:"#d4608a",width:36,height:36,borderRadius:"50%",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <h3 className="ds" style={{fontSize:22,color:"#d4608a"}}>{monthNames[month]} {year}</h3>
          <button onClick={next} style={{background:"rgba(244,167,185,0.15)",border:"none",cursor:"pointer",color:"#d4608a",width:36,height:36,borderRadius:"50%",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:8}}>
          {dayNames.map(d=><p key={d} style={{textAlign:"center",fontSize:11,color:"#c8a8e9",fontWeight:700}}>{d}</p>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
          {Array(firstDay).fill(null).map((_,i)=><div key={`e${i}`}/>)}
          {Array(daysInMonth).fill(null).map((_,i)=>{
            const day=i+1;
            const memberIds=dayMembers[day]?[...dayMembers[day]]:[];
            const hasEntry=memberIds.length>0;
            const isToday=new Date().getDate()===day&&new Date().getMonth()===month&&new Date().getFullYear()===year;
            return (
              <div key={day} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 2px",borderRadius:12,background:isToday?"linear-gradient(135deg,#F4A7B9,#C8A8E9)":hasEntry?"rgba(244,167,185,0.12)":"transparent"}}>
                <span style={{fontSize:13,fontWeight:hasEntry||isToday?700:400,color:isToday?"#fff":hasEntry?"#d4608a":"#888"}}>{day}</span>
                {hasEntry && (
                  <div style={{display:"flex",gap:1,flexWrap:"wrap",justifyContent:"center"}}>
                    {memberIds.slice(0,3).map(mid=>{
                      const m=members.find(x=>x.id===mid);
                      return m?(
                        <div key={mid} style={{width:14,height:14,borderRadius:"50%",background:m.color,border:"1px solid #fff",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:700,color:"#fff"}}>
                          {m.profilePic?<img src={m.profilePic} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:m.avatar}
                        </div>
                      ):null;
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </GlassCard>
      {mostActive.length>0 && (
        <GlassCard style={{padding:16}}>
          <h3 style={{fontSize:14,fontWeight:700,color:"#d4608a",marginBottom:12}}>⭐ Most Active This Month</h3>
          {mostActive.map(({member:m,count},idx)=>(
            <div key={m.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <span style={{fontSize:16,width:24,textAlign:"center",color:"#d4608a",fontWeight:700}}>{idx===0?"🥇":idx===1?"🥈":idx===2?"🥉":`${idx+1}.`}</span>
              <Avatar member={m} size={34}/>
              <div style={{flex:1}}>
                <p style={{fontSize:14,fontWeight:700,color:"#444"}}>{m.name}</p>
                <div style={{height:6,borderRadius:999,background:"rgba(244,167,185,0.2)",marginTop:3,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:999,background:`linear-gradient(90deg, ${m.color}, #F4A7B9)`,width:`${Math.min(100,(count/(mostActive[0]?.count||1))*100)}%`}}/>
                </div>
              </div>
              <span style={{fontSize:13,fontWeight:700,color:"#d4608a"}}>{count}</span>
            </div>
          ))}
        </GlassCard>
      )}
    </div>
  );
};

        </div>
        {error && <p style={{color:"#e05c8a",fontSize:13,textAlign:"center",marginBottom:12}}>{error}</p>}
        <PillBtn onClick={login} color="#F4A7B9" style={{width:"100%",justifyContent:"center",padding:"12px"}}>Enter Diary ✨</PillBtn>
      </GlassCard>
    </div>
  );
};

// ── Main App
function App() {
  const [members, setMembers] = useState(()=>lsLoad("dd_members",MEMBERS_INIT));
  const [currentMember, setCurrentMember] = useState(()=>lsLoad("dd_currentMember",null));
  const [entries, setEntries] = useState(()=>lsLoad("dd_entries",[]));
  const [page, setPage] = useState("home");
  const [showNewEntry, setShowNewEntry] = useState(false);
  const [showNotifs, setShowNotifs] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");
  const [showSearch, setShowSearch] = useState(false);
  const [homeBanner, setHomeBanner] = useState(()=>lsLoad("dd_banner",null));
  const [viewingProfile, setViewingProfile] = useState(null);
  const [editingSettings, setEditingSettings] = useState(false);

  useEffect(()=>{lsSave("dd_members",members);},[members]);
  useEffect(()=>{lsSave("dd_entries",entries);},[entries]);
  useEffect(()=>{lsSave("dd_currentMember",currentMember);},[currentMember]);
  useEffect(()=>{lsSave("dd_banner",homeBanner);},[homeBanner]);

  const me = currentMember ? members.find(m=>m.id===currentMember.id) : null;
  const saveEntry = entry => { setEntries(prev=>[entry,...prev]); setShowNewEntry(false); };
  const deleteEntry = id => setEntries(prev=>prev.filter(e=>e.id!==id));
  const likeEntry = id => {
    setEntries(prev=>prev.map(e=>{
      if(e.id!==id) return e;
      const likes=e.likes.includes(me.id)?e.likes.filter(l=>l!==me.id):[...e.likes,me.id];
      return {...e,likes};
    }));
  };
  const commentEntry = (id,comment) => {
    setEntries(prev=>prev.map(e=>e.id===id?{...e,comments:[...e.comments,comment]}:e));
  };
  const updateMember = updated => {
    setMembers(prev=>prev.map(m=>m.id===updated.id?updated:m));
    setCurrentMember(updated);
  };
  const logout = () => { setCurrentMember(null); setPage("home"); setViewingProfile(null); setEditingSettings(false); };
  const notifCount = me ? entries
    .filter(e=>e.authorId===me.id)
    .reduce((sum,e)=>sum+e.likes.filter(l=>l!==me.id).length+e.comments.filter(c=>c.authorId!==me.id).length,0)
    : 0;
  const visibleEntries = entries.filter(e=>{
    if(e.isDraft&&e.authorId!==me?.id) return false;
    if(e.privacy==="private"&&e.authorId!==me?.id) return false;
    if(searchQuery){ const q=searchQuery.toLowerCase(); return e.title.toLowerCase().includes(q)||e.body.toLowerCase().includes(q); }
    return true;
  });

  if(!me) return (
    <>
      <PolkaBg/>
      <LoginPage members={members} onLogin={m=>setCurrentMember(m)}/>
    </>
  );

  if(editingSettings) return (
    <>
      <PolkaBg/>
      <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh"}}>
        <SettingsPage member={me} onUpdate={updateMember} onBack={()=>setEditingSettings(false)}/>
      </div>
    </>
  );

  if(viewingProfile) {
    const isOwn = viewingProfile.id===me.id;
    return (
      <>
        <PolkaBg/>
        <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh"}}>
          <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(255,245,248,0.85)",backdropFilter:"blur(12px)",padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>setViewingProfile(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#d4608a"}}><ChevronLeft size={24}/></button>
            <span style={{fontWeight:700,color:"#444"}}>{viewingProfile.name}</span>
          </div>
          <ProfilePage
            member={members.find(m=>m.id===viewingProfile.id)||viewingProfile}
            entries={entries} members={members} currentMember={me}
            onEdit={()=>{setEditingSettings(true);setViewingProfile(null);}}
            isOwn={isOwn}/>
        </div>
      </>
    );
  }

  const navItems = [
    {id:"home",icon:<Home size={20}/>,label:"Home"},
    {id:"diaries",icon:<BookOpen size={20}/>,label:"Diaries"},
    {id:"media",icon:<Image size={20}/>,label:"Media"},
    {id:"calendar",icon:<Calendar size={20}/>,label:"Calendar"},
    {id:"members",icon:<Users size={20}/>,label:"Members"},
  ];

  return (
    <>
      <PolkaBg/>
      <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",position:"relative"}}>
        {/* Top Bar */}
        <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(255,245,248,0.9)",backdropFilter:"blur(12px)",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(244,167,185,0.2)"}}>
          <h1 className="ds" style={{fontSize:24,color:"#d4608a"}}>Dear Diary</h1>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {showSearch && (
              <input autoFocus value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="Search entries…"
                style={{border:"1px solid rgba(244,167,185,0.4)",borderRadius:999,padding:"6px 14px",fontSize:13,outline:"none",background:"rgba(255,255,255,0.85)"}}/>
            )}
            <button onClick={()=>{setShowSearch(!showSearch);if(showSearch)setSearchQuery("");}} style={{background:"none",border:"none",cursor:"pointer",color:"#d4608a"}}>
              <Search size={20}/>
            </button>
            <button onClick={()=>setShowNotifs(!showNotifs)} style={{background:"none",border:"none",cursor:"pointer",color:"#d4608a",position:"relative"}}>
              <Bell size={20}/>
              {notifCount>0 && <span style={{position:"absolute",top:-4,right:-4,background:"#e05c8a",color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{notifCount}</span>}
            </button>
            <button onClick={()=>setViewingProfile(me)} style={{background:"none",border:"none",cursor:"pointer"}}>
              <Avatar member={me} size={32}/>
            </button>
            <button onClick={logout} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc"}}>
              <LogOut size={18}/>
            </button>
          </div>
        </div>

        {/* Page Content */}
        <div>
          {page==="home" && (
            <div style={{padding:16,paddingBottom:80}}>
              <HomeBanner bannerImage={homeBanner} onBannerChange={setHomeBanner}/>
              {entries.filter(e=>e.isDraft&&e.authorId===me.id).length>0 && (
                <div style={{marginBottom:16}}>
                  <h3 style={{fontSize:14,color:"#aaa",fontWeight:700,marginBottom:8}}>✏️ Drafts</h3>
                  {entries.filter(e=>e.isDraft&&e.authorId===me.id).map(e=>(
                    <EntryCard key={e.id} entry={e} members={members} currentMember={me}
                      onLike={likeEntry} onComment={commentEntry} onDelete={deleteEntry}/>
                  ))}
                </div>
              )}
              {visibleEntries.filter(e=>!e.isDraft).length===0
                ? <GlassCard style={{padding:40,textAlign:"center"}}>
                    <p className="ds" style={{fontSize:24,color:"#d4608a",marginBottom:8}}>Start writing!</p>
                    <p style={{color:"#bbb",fontSize:14}}>Tap the + button to create your first entry</p>
                  </GlassCard>
                : visibleEntries.filter(e=>!e.isDraft).map(e=>(
                    <EntryCard key={e.id} entry={e} members={members} currentMember={me}
                      onLike={likeEntry} onComment={commentEntry} onDelete={deleteEntry}/>
                  ))
              }
            </div>
          )}
          {page==="diaries" && (
            <div style={{padding:16,paddingBottom:100}}>
              <h2 className="ds" style={{fontSize:28,color:"#d4608a",marginBottom:16}}>Diaries</h2>
              {visibleEntries.filter(e=>!e.isDraft).length===0
                ? <GlassCard style={{padding:40,textAlign:"center"}}>
                    <p className="ds" style={{fontSize:24,color:"#d4608a",marginBottom:8}}>No entries yet</p>
                    <p style={{color:"#bbb",fontSize:14}}>Be the first to write something ✨</p>
                  </GlassCard>
                : visibleEntries.filter(e=>!e.isDraft).map(e=>(
                    <EntryCard key={e.id} entry={e} members={members} currentMember={me}
                      onLike={likeEntry} onComment={commentEntry} onDelete={deleteEntry}/>
                  ))
              }
            </div>
          )}
          {page==="media" && <MediaPage entries={entries} members={members} currentMember={me}/>}
          {page==="calendar" && <CalendarPage entries={entries} members={members} currentMember={me}/>}
          {page==="members" && <MembersPage members={members} currentMember={me} entries={entries} onViewProfile={m=>setViewingProfile(m)}/>}
        </div>

        {/* FAB */}
        <button onClick={()=>setShowNewEntry(true)} style={{
          position:"fixed",bottom:92,right:"max(16px, calc(50% - 224px))",
          width:56,height:56,borderRadius:"50%",
          background:"linear-gradient(135deg,#F4A7B9,#C8A8E9)",
          border:"none",cursor:"pointer",color:"#fff",
          display:"flex",alignItems:"center",justifyContent:"center",
          boxShadow:"0 4px 20px rgba(244,167,185,0.5)",zIndex:90
        }}>
          <Plus size={24}/>
        </button>

        {/* Bottom Nav */}
        <div style={{
          position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",
          display:"flex",alignItems:"center",gap:4,
          background:"rgba(255,255,255,0.92)",backdropFilter:"blur(20px)",
          WebkitBackdropFilter:"blur(20px)",
          borderRadius:999,
          border:"1px solid rgba(244,167,185,0.3)",
          boxShadow:"0 8px 32px rgba(244,167,185,0.25)",
          padding:"6px 10px",zIndex:100
        }}>
          {navItems.map(n=>(
            <button key={n.id} onClick={()=>setPage(n.id)} style={{
              display:"flex",flexDirection:"column",alignItems:"center",gap:2,
              padding:"7px 14px",borderRadius:999,border:"none",cursor:"pointer",
              background:page===n.id?"#fff":"transparent",
              boxShadow:page===n.id?"0 0 0 2px #F4A7B9":"none",
              color:page===n.id?"#d4608a":"#bbb",
              transition:"all 0.2s",minWidth:52
            }}>
              {n.icon}
              <span style={{fontSize:9,fontWeight:700}}>{n.label}</span>
            </button>
          ))}
        </div>

        {showNewEntry && <NewEntryModal member={me} members={members} onSave={saveEntry} onClose={()=>setShowNewEntry(false)}/>}
        {showNotifs && <NotificationsPanel entries={entries} members={members} currentMember={me} onClose={()=>setShowNotifs(false)}/>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
